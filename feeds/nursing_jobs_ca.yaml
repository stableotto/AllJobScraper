# California nursing positions — example of a geo-filtered feed
name: "California Nursing Jobs"
description: "Active nursing positions in California"
output_formats: [json, csv]
output_dir: "data/feeds/nursing_jobs_ca"

filters:
  sectors: [healthcare, hospital, health_system, university_hospital, medical_group, childrens]
  states: [CA]
  is_nursing: true
  title_keywords: [nurse, nursing, "RN", "LPN", "NP", "CNA", "CRNA"]
  exclude_keywords: [veterinary, animal]
  posted_within_days: 30
