name: Daily Healthcare Job Scraper

on:
  schedule:
    # Run once per day at 6 AM UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode"
        required: true
        default: "scrape-and-feeds"
        type: choice
        options:
          - full              # discover + scrape + feeds
          - scrape-and-feeds  # scrape + feeds (skip discovery)
          - feeds-only        # just regenerate feeds
      portal:
        description: "Scrape a specific portal slug (leave empty for all)"
        required: false
        default: ""
      limit:
        description: "Max portals to scrape (leave empty for all)"
        required: false
        default: ""
      date_filter:
        description: "Which jobs to include"
        required: true
        default: "today-only"
        type: choice
        options:
          - today-only    # Only jobs posted today
          - all-dates     # All jobs regardless of date

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install psycopg2-binary 2>/dev/null || true

      - name: Initialize database
        run: |
          python -c "
          from storage.database import init_db
          from config.settings import DB_PATH
          init_db(DB_PATH)
          print(f'Database initialized at {DB_PATH}')
          "

      - name: Seed portals from portals.yaml into DB
        run: |
          python -c "
          from storage.database import init_db, db_session, upsert_portal
          from config.settings import DB_PATH
          from urllib.parse import urlparse
          import yaml

          init_db(DB_PATH)
          with open('config/portals.yaml') as f:
              data = yaml.safe_load(f)

          with db_session(DB_PATH) as conn:
              icims_count = 0
              workday_count = 0

              # Seed iCIMS portals
              for entry in data.get('icims', []):
                  slug = entry.get('ats_slug', '')
                  url = entry.get('url', '')
                  hostname = urlparse(url).hostname or ''
                  if hostname and hostname.endswith('.icims.com'):
                      subdomain = hostname
                  elif slug:
                      subdomain = f'careers-{slug}.icims.com'
                  else:
                      continue
                  upsert_portal(
                      conn, subdomain=subdomain, slug=slug,
                      name=entry.get('name', ''), url=url,
                      ats_type='icims', sector=entry.get('sector', 'hospital'),
                      state=entry.get('state', ''), verified=True,
                  )
                  icims_count += 1

              # Seed Workday portals
              for entry in data.get('workday', []):
                  url = entry.get('url', '')
                  if not url:
                      continue
                  hostname = urlparse(url).hostname or ''
                  parts = hostname.split('.')
                  if len(parts) >= 3 and 'myworkdayjobs' in hostname:
                      tenant = parts[0]
                      upsert_portal(
                          conn, subdomain=hostname, slug=tenant,
                          name=entry.get('name', tenant.upper()), url=url,
                          ats_type='workday', sector=entry.get('sector', 'hospital'),
                          state=entry.get('state', ''), verified=True,
                      )
                      workday_count += 1

              # Seed TalentBrew portals
              talentbrew_count = 0
              for entry in data.get('talentbrew', []):
                  url = entry.get('url', '')
                  if not url:
                      continue
                  slug = entry.get('slug', '')
                  if not slug:
                      # Generate slug from URL
                      hostname = urlparse(url).hostname or ''
                      slug = hostname.replace('careers.', '').replace('.org', '').replace('.com', '')
                  upsert_portal(
                      conn, subdomain=slug, slug=slug,
                      name=entry.get('name', slug), url=url,
                      ats_type='talentbrew', sector=entry.get('sector', 'hospital'),
                      state=entry.get('state', ''), verified=True,
                  )
                  talentbrew_count += 1

              print(f'Seeded {icims_count} iCIMS + {workday_count} Workday + {talentbrew_count} TalentBrew portals into DB')
          "

      - name: Run pipeline
        env:
          MODE: ${{ github.event.inputs.mode || 'scrape-and-feeds' }}
          PORTAL: ${{ github.event.inputs.portal || '' }}
          LIMIT: ${{ github.event.inputs.limit || '' }}
          DATE_FILTER: ${{ github.event.inputs.date_filter || 'today-only' }}
          LOG_LEVEL: INFO
        run: |
          ARGS="daily"

          if [ "$MODE" = "feeds-only" ]; then
            ARGS="$ARGS --feeds-only"
          elif [ "$MODE" = "scrape-and-feeds" ]; then
            ARGS="$ARGS --skip-discovery"
          fi

          if [ -n "$PORTAL" ]; then
            ARGS="$ARGS --scrape-portal $PORTAL"
          fi

          if [ -n "$LIMIT" ]; then
            ARGS="$ARGS --scrape-limit $LIMIT"
          fi

          if [ "$DATE_FILTER" = "all-dates" ]; then
            ARGS="$ARGS --all-dates"
          fi

          python pipeline.py $ARGS

      - name: Show pipeline status
        if: always()
        run: python pipeline.py status

      - name: Upload data as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nursescraper-data-${{ github.run_number }}
          path: |
            data/nursescraper.db
            data/feeds/
          retention-days: 30

      - name: Commit updated data to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/nursescraper.db
          git add -f data/feeds/
          git diff --staged --quiet || git commit -m "chore: daily job scrape $(date -u +%Y-%m-%d) [skip ci]"
          git push
